name: ✔️ Fullstack III - CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 🍃 TRABAJO: Compilar y verificar el Backend (Spring Boot / Maven)
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: ⚙️ Compilar y Ejecutar Tests (Maven)
        run: |
          cd api-core-service
          # mvn clean test compila el código y corre el archivo ItemServiceTest.java automaticamente
          mvn clean test
