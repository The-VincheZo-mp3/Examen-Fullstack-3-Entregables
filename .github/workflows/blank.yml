name: ✔️ Fullstack III - CI Fullstack Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 🍃 TRABAJO 1: Buscar y compilar el Backend (Spring Boot)
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Detectar y Compilar Backend automáticamente
        run: |
          POM_PATH=$(find . -name "pom.xml" -print -quit)
          if [ -z "$POM_PATH" ]; then
            echo "⚠️ No se encontró ningún archivo pom.xml en el repositorio. Saltando backend..."
          else
            BACKEND_DIR=$(dirname "$POM_PATH")
            echo "📂 Proyecto Maven detectado en: $BACKEND_DIR"
            cd "$BACKEND_DIR"
            mvn clean test
          fi

  # ⚛️ TRABAJO 2: Buscar y validar el Frontend (React / Node)
  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js (Versión LTS 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Detectar, Instalar y Probar Frontend automáticamente
        run: |
          # Buscamos el package.json que NO esté dentro de api-core-service ni node_modules
          PACKAGE_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/api-core-service/*" -print -quit)
          
          if [ -z "$PACKAGE_PATH" ]; then
            echo "⚠️ No se encontró un package.json independiente para el frontend. Saltando frontend..."
          else
            FRONTEND_DIR=$(dirname "$PACKAGE_PATH")
            echo "📂 Proyecto Frontend detectado en: $FRONTEND_DIR"
            cd "$FRONTEND_DIR"
            npm install
            
            if npm run | grep -q "test"; then
              npm test -- --coverage --watchAll=false
            else
              npm run build --if-present
            fi
          fi
