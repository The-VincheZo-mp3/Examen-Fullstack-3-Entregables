name: ✔️ Fullstack III - CI Fullstack Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Detectar y Compilar Backend automáticamente
        run: |
          POM_PATH=$(find . -name "pom.xml" -print -quit)
          if [ -z "$POM_PATH" ]; then
            echo "⚠️ No se encontró ningún archivo pom.xml. Saltando backend..."
          else
            BACKEND_DIR=$(dirname "$POM_PATH")
            echo "📂 Proyecto Maven detectado en: $BACKEND_DIR"
            cd "$BACKEND_DIR"
            mvn clean test
          fi
